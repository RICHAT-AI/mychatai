<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MyChatAI - Trò chuyện với Giáo sư Phong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        :root {
            --bg-primary: #faf0f5;
            --bg-chat: #fff5f9;
            --user-msg: #ffd9e6;
            --bot-msg: #ffffff;
            --accent: #ff8a9c;
            --accent-dark: #e46b80;
            --text: #4a4a4a;
            --text-light: #888;
            --border: #ffd0da;
            --input-bg: #ffffff;
            --input-text: #333333;
            --modal-overlay: rgba(0,0,0,0.3);
        }

        [data-theme="dark"] {
            --bg-primary: #2d1f2a;
            --bg-chat: #352a31;
            --user-msg: #8e5a6b;
            --bot-msg: #4d3a44;
            --accent: #ff9eb5;
            --accent-dark: #d47e94;
            --text: #f0e0e8;
            --text-light: #c0a8b5;
            --border: #6b4a57;
            --input-bg: #4d3a44;
            --input-text: #f0e0e8;
            --modal-overlay: rgba(0,0,0,0.7);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
            margin: 0;
            padding: 0;
        }

        #app {
            width: 100%;
            max-width: 1000px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: var(--bg-chat);
        }

        @media (min-width: 768px) {
            #app {
                height: 95vh;
                margin: 10px;
                border-radius: 28px;
                box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            }
        }

        /* Header */
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-chat);
        }

        @media (min-width: 768px) {
            .chat-header {
                padding: 20px 25px;
            }
        }

        .chat-header-info h3 {
            font-size: 1.2rem;
            color: var(--accent-dark);
            font-weight: 600;
        }

        .chat-header-info p {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-actions button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--accent);
            padding: 6px;
            border-radius: 50%;
            transition: 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-actions button:hover {
            background: rgba(255,138,156,0.15);
        }

        /* Messages Container */
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--bg-chat);
        }

        @media (min-width: 768px) {
            #messages-container {
                padding: 20px 25px;
                gap: 12px;
            }
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            position: relative;
        }

        @media (min-width: 768px) {
            .message-wrapper {
                max-width: 80%;
            }
        }

        .message-wrapper.user {
            align-self: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
        }

        .message-wrapper.inner-thought {
            align-self: flex-start;
            opacity: 0.8;
            margin-left: 15px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        @media (min-width: 768px) {
            .message {
                padding: 12px 18px;
                font-size: 0.95rem;
                border-radius: 24px;
            }
        }

        .user .message {
            background: var(--user-msg);
            border-bottom-right-radius: 4px;
            color: var(--text);
        }

        .bot .message {
            background: var(--bot-msg);
            border-bottom-left-radius: 4px;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .inner-thought .message {
            background: rgba(255,209,220,0.3);
            border-left: 3px solid var(--accent);
            border-radius: 10px 20px 20px 10px;
            font-style: italic;
            color: var(--text-light);
            font-size: 0.85rem;
            backdrop-filter: blur(2px);
        }

        .inner-thought .message::before {
            content: "💭 ";
            font-size: 0.9rem;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 4px;
            font-size: 0.7rem;
        }

        .message-actions button {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 12px;
        }

        .message-actions button:hover {
            color: var(--accent);
            background: rgba(255,138,156,0.1);
        }

        /* Input Area */
        #input-area {
            padding: 10px 15px 15px;
            border-top: 1px solid var(--border);
            background: var(--bg-chat);
        }

        @media (min-width: 768px) {
            #input-area {
                padding: 15px 25px 20px;
            }
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--input-bg);
            border-radius: 30px;
            padding: 8px 12px;
            border: 1px solid var(--border);
        }

        textarea#message-input {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            max-height: 100px;
            padding: 8px 5px;
            font-size: 0.95rem;
            background: transparent;
            color: var(--input-text);
            font-family: inherit;
        }

        textarea#message-input::placeholder {
            color: var(--text-light);
            opacity: 0.7;
        }

        .input-actions {
            display: flex;
            gap: 5px;
        }

        .input-actions button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--accent);
            padding: 5px;
            border-radius: 50%;
            transition: 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-actions button:hover {
            background: rgba(255,138,156,0.1);
        }

        .input-actions button.send-btn {
            background: var(--accent);
            color: white;
        }

        .input-actions button.send-btn:hover {
            background: var(--accent-dark);
        }

        .input-actions button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .char-counter {
            text-align: right;
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 5px;
            padding-right: 10px;
        }

        /* Footer credit */
        .footer-credit {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-light);
            padding: 6px 0;
            border-top: 1px solid var(--border);
            background: var(--bg-chat);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bot-msg);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.5s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-chat);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        .modal-content h3 {
            color: var(--accent-dark);
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .modal-content label {
            display: block;
            margin-bottom: 5px;
            color: var(--text);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--input-bg);
            color: var(--input-text);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .modal-content textarea {
            min-height: 200px;
            font-family: monospace;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-actions button.save {
            background: var(--accent);
            color: white;
        }

        .modal-actions button.save:hover {
            background: var(--accent-dark);
        }

        .modal-actions button.cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .modal-actions button.cancel:hover {
            background: rgba(255,138,156,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-info">
                <h3>MyChatAI ✨</h3>
                <p id="user-role-display">Bạn đang nhập vai <span id="username-display">User</span> · Giáo sư Trần Minh Phong</p>
            </div>
            <div class="header-actions">
                <button id="settings-btn" title="Cài đặt">⚙️</button>
                <button id="theme-toggle" title="Chế độ tối/sáng">🌙</button>
                <button id="clear-chat" title="Xóa chat">🗑️</button>
            </div>
        </div>

        <!-- Messages Container -->
        <div id="messages-container"></div>

        <!-- Input Area -->
        <div id="input-area">
            <div class="input-wrapper">
                <textarea id="message-input" placeholder="Nhập lời thoại của bạn..." rows="1" maxlength="800"></textarea>
                <div class="input-actions">
                    <button id="regenerate-btn" title="AI trả lời lại">🔄</button>
                    <button id="send-btn" class="send-btn" title="Gửi">📤</button>
                </div>
            </div>
            <div class="char-counter">
                <span id="char-count">0</span>/800
            </div>
        </div>

        <!-- Footer credit -->
        <div class="footer-credit">
            MyChatAI được phát triển bởi Lê Thảo Quỳnh 💕
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>⚙️ Cài đặt</h3>
            
            <label for="username-input">Tên người dùng (vai trò của bạn)</label>
            <input type="text" id="username-input" placeholder="Nhập tên bạn muốn xưng hô..." value="User">

            <label for="prompt-input">System Prompt (nội dung hướng dẫn AI)</label>
            <textarea id="prompt-input" placeholder="Dán system prompt vào đây..."></textarea>

            <div class="modal-actions">
                <button class="save" id="save-settings">Lưu</button>
                <button class="cancel" id="close-settings">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- Biến toàn cục ----------
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-btn');
        const regenerateButton = document.getElementById('regenerate-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const clearChatBtn = document.getElementById('clear-chat');
        const settingsBtn = document.getElementById('settings-btn');
        const charCount = document.getElementById('char-count');
        const usernameDisplay = document.getElementById('username-display');

        // Modal elements
        const settingsModal = document.getElementById('settings-modal');
        const usernameInput = document.getElementById('username-input');
        const promptInput = document.getElementById('prompt-input');
        const saveSettingsBtn = document.getElementById('save-settings');
        const closeSettingsBtn = document.getElementById('close-settings');

        let conversationHistory = [];
        let lastUserMessage = '';
        let isWaitingForResponse = false;
        let username = 'User';
        let systemPrompt = '';          // prompt dùng cho chat
        let currentPrompt = '';          // prompt hiện tại (đồng bộ với server)

        // Key lưu trong localStorage
        const STORAGE_KEY = 'mychatai_history';
        const THEME_KEY = 'mychatai_theme';
        const USERNAME_KEY = 'mychatai_username';
        const PROMPT_KEY = 'mychatai_prompt';

        // ---------- Khởi tạo ----------
        async function init() {
            loadTheme();
            loadUsername();
            await loadSystemPrompt();
            loadHistory();
            setupEventListeners();
            updateCharCount();
        }

        // ---------- Theme ----------
        function loadTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(THEME_KEY, newTheme);
            themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // ---------- Username ----------
        function loadUsername() {
            const saved = localStorage.getItem(USERNAME_KEY);
            if (saved) {
                username = saved;
            } else {
                username = 'User';
                localStorage.setItem(USERNAME_KEY, username);
            }
            usernameDisplay.textContent = username;
        }

        function saveUsername(newName) {
            username = newName;
            localStorage.setItem(USERNAME_KEY, username);
            usernameDisplay.textContent = username;
        }

        // ---------- System Prompt ----------
        async function loadSystemPrompt() {
            // Luôn lấy từ server khi khởi tạo
            try {
                const response = await fetch('https://mychatai-backend-er2y.onrender.com/get-prompt');
                if (response.ok) {
                    const data = await response.json();
                    currentPrompt = data.prompt;
                    systemPrompt = currentPrompt;
                    promptInput.value = currentPrompt;
                    localStorage.setItem(PROMPT_KEY, currentPrompt);
                } else {
                    console.error('Không thể lấy prompt từ backend');
                    // fallback: dùng localStorage nếu có
                    const saved = localStorage.getItem(PROMPT_KEY);
                    if (saved) {
                        currentPrompt = saved;
                        systemPrompt = saved;
                        promptInput.value = saved;
                    }
                }
            } catch (error) {
                console.error('Lỗi khi lấy prompt:', error);
                const saved = localStorage.getItem(PROMPT_KEY);
                if (saved) {
                    currentPrompt = saved;
                    systemPrompt = saved;
                    promptInput.value = saved;
                }
            }
        }

        async function saveSystemPrompt(newPrompt) {
            currentPrompt = newPrompt;
            systemPrompt = newPrompt;
            localStorage.setItem(PROMPT_KEY, newPrompt);

            try {
                const response = await fetch('https://mychatai-backend-er2y.onrender.com/update-prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: newPrompt })
                });
                if (!response.ok) {
                    console.error('Không thể cập nhật prompt trên backend');
                    alert('Lưu ở localStorage nhưng server chưa cập nhật!');
                }
            } catch (error) {
                console.error('Lỗi khi gửi prompt mới:', error);
                alert('Không thể kết nối đến server để cập nhật prompt');
            }
        }

        // ---------- Lịch sử ----------
        function loadHistory() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    conversationHistory = JSON.parse(stored);
                } catch (e) {
                    console.error('Lỗi parse history', e);
                    setDefaultHistory();
                }
            } else {
                setDefaultHistory();
            }
            renderMessages();
        }

        function setDefaultHistory() {
            const opening = `🏠 [Địa điểm]: Đại học Bách Khoa - Phòng làm việc khoa Toán (P.305)
⏰ [Thời gian]: Thứ Sáu 13/03/2026 - 17:09
🌡️ [Nhiệt độ]: 28°C

Phòng làm việc của khoa Toán chìm trong không khí lạnh của điều hòa. Trên bàn, những chồng bài thi được xếp ngay ngắn, góc nào ra góc đó. Mỗi cây bút đều nằm trên giá đúng vị trí.

Cốc cốc cốc.

"Vào."

Cánh cửa hé mở. Quỳnh vừa bước vào. Phong không ngẩng lên, những ngón tay vẫn gõ bàn phím với nhịp điệu đều đặn. Mười giây. Hai mươi giây. Ba mươi giây.

Cuối cùng, anh ngẩng lên. Em đang đứng trước bàn làm việc, tay ôm tập bài dày. Mái tóc dài đen nhánh. Chiếc sơ mi trắng đồng phục.

Lê Thảo Quỳnh. Anh nhớ tên em. Nhớ cả cái cách em luôn né tránh ánh mắt anh mỗi lần tình cờ gặp ở hành lang.

Phong liếc nhìn đồng hồ, giọng lạnh tanh:

"Cô biết bây giờ là mấy giờ không?"

Em im lặng. Phong hơi nheo mắt, cảm nhận có điều gì đó khác thường. Một sự căng thẳng vô hình. Em vẫn đứng đó, anh vẫn ngồi đây. Và khoảng cách giữa họ, dù chỉ vài bước chân, bỗng trở nên xa lạ đến kỳ lạ.

Anh đưa tay, kéo tập bài về phía mình, lật nhanh vài trang. Chữ viết đẹp, trình bày cẩn thận. Một bài làm tốt. Giá mà đúng giờ.

Phong ngẩng lên, nhìn thẳng vào em:

"Hạn nộp là 17h. Bây giờ là 17h09. Tôi có thể cho cô hai lựa chọn. Một, cô cầm bài về và nộp vào đúng hạn của đợt sau. Hai..."`;

            conversationHistory = [
                { id: generateId(), role: 'assistant', content: opening, type: 'chat' }
            ];
            saveToStorage();
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
        }

        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        // ---------- Render ----------
        function renderMessages() {
            messagesContainer.innerHTML = '';
            conversationHistory.forEach(msg => {
                displayMessage(msg);
            });
            scrollToBottom();
        }

        function displayMessage(msg) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${msg.role === 'user' ? 'user' : 'bot'}`;
            if (msg.type === 'inner-thought') {
                wrapper.classList.add('inner-thought');
                wrapper.classList.remove('bot');
            }
            wrapper.dataset.id = msg.id;

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.textContent = msg.content;
            wrapper.appendChild(messageDiv);

            // Nếu là user, thêm nút sửa/xóa
            if (msg.role === 'user') {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                actionsDiv.innerHTML = `
                    <button class="edit-btn" data-id="${msg.id}">✏️ Sửa</button>
                    <button class="delete-btn" data-id="${msg.id}">🗑 Xóa</button>
                `;
                wrapper.appendChild(actionsDiv);
            }

            messagesContainer.appendChild(wrapper);
        }

        function appendMessage(msg) {
            displayMessage(msg);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ---------- Typing Indicator ----------
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message-wrapper bot';
            indicator.id = 'typing-indicator';
            indicator.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesContainer.appendChild(indicator);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // ---------- Gửi tin nhắn ----------
        async function sendMessage(userMessage, isRegenerate = false) {
            if (isWaitingForResponse) return;

            if (!userMessage.trim()) return;

            // Nếu không phải regenerate, thêm tin nhắn user mới
            if (!isRegenerate) {
                const newMsg = {
                    id: generateId(),
                    role: 'user',
                    content: userMessage,
                    type: 'chat'
                };
                conversationHistory.push(newMsg);
                appendMessage(newMsg);
                lastUserMessage = userMessage;
            }

            // Chuẩn bị messages gửi lên API
            const messagesToSend = conversationHistory
                .filter(m => m.type !== 'inner-thought')
                .map(m => ({ role: m.role, content: m.content }));

            isWaitingForResponse = true;
            setButtonsDisabled(true);
            showTypingIndicator();

            try {
                const response = await fetch('https://mychatai-backend-er2y.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messagesToSend })
                });

                if (!response.ok) {
                    throw new Error(`Lỗi server: ${response.status}`);
                }

                const data = await response.json();
                const botReply = data.reply;

                hideTypingIndicator();

                // Tách inner thoughts từ bot reply (nếu có)
                const innerThoughtMatch = botReply.match(/\[inner\]\s*(.*?)\s*\[\/inner\]/i);
                let chatContent = botReply;
                let innerThought = null;

                if (innerThoughtMatch) {
                    innerThought = innerThoughtMatch[1];
                    chatContent = botReply.replace(/\[inner\].*?\[\/inner\]/i, '').trim();
                }

                // Thêm inner thought message
                if (innerThought) {
                    const innerMsg = {
                        id: generateId(),
                        role: 'assistant',
                        content: innerThought,
                        type: 'inner-thought'
                    };
                    conversationHistory.push(innerMsg);
                    appendMessage(innerMsg);
                }

                // Thêm chat message
                const botMsg = {
                    id: generateId(),
                    role: 'assistant',
                    content: chatContent,
                    type: 'chat'
                };
                conversationHistory.push(botMsg);
                appendMessage(botMsg);

                saveToStorage();

            } catch (error) {
                hideTypingIndicator();
                console.error('Lỗi:', error);
                alert('Có lỗi xảy ra: ' + error.message);
            } finally {
                isWaitingForResponse = false;
                setButtonsDisabled(false);
                messageInput.focus();
            }
        }

        // ---------- Regenerate ----------
        async function regenerateLastResponse() {
            if (isWaitingForResponse) {
                alert('Đang chờ phản hồi, vui lòng đợi...');
                return;
            }

            // Tìm vị trí tin nhắn user cuối cùng
            const lastUserIndex = [...conversationHistory].reverse().findIndex(m => m.role === 'user');
            if (lastUserIndex === -1) {
                alert('Không có tin nhắn user để regenerate');
                return;
            }

            const userIndex = conversationHistory.length - 1 - lastUserIndex;
            
            // Xóa tất cả tin nhắn sau userIndex (bao gồm cả inner thoughts và assistant)
            conversationHistory = conversationHistory.slice(0, userIndex + 1);
            
            // Lấy nội dung tin nhắn user cuối cùng
            lastUserMessage = conversationHistory[userIndex].content;

            saveToStorage();
            renderMessages();

            // Gửi lại
            await sendMessage(lastUserMessage, true);
        }

        // ---------- Xóa tin nhắn ----------
        function deleteMessage(messageId) {
            const index = conversationHistory.findIndex(m => m.id === messageId);
            if (index === -1) return;

            conversationHistory = conversationHistory.slice(0, index);
            saveToStorage();
            renderMessages();
        }

        // ---------- Sửa tin nhắn ----------
        function editMessage(messageId) {
            const msgIndex = conversationHistory.findIndex(m => m.id === messageId);
            if (msgIndex === -1) return;

            const oldMsg = conversationHistory[msgIndex];
            const newContent = prompt('Sửa tin nhắn:', oldMsg.content);
            if (newContent === null || !newContent.trim()) return;

            conversationHistory = conversationHistory.slice(0, msgIndex);

            const editedMsg = {
                id: generateId(),
                role: 'user',
                content: newContent,
                type: 'chat'
            };
            conversationHistory.push(editedMsg);
            lastUserMessage = newContent;

            saveToStorage();
            renderMessages();

            sendMessage(newContent, true);
        }

        // ---------- Xóa toàn bộ chat ----------
        function clearChat() {
            if (confirm('Xóa toàn bộ cuộc trò chuyện?')) {
                setDefaultHistory();
                renderMessages();
            }
        }

        // ---------- Character count ----------
        function updateCharCount() {
            const length = messageInput.value.length;
            charCount.textContent = length;
            charCount.style.color = length >= 800 ? 'red' : 'var(--text-light)';
        }

        // ---------- UI Helpers ----------
        function setButtonsDisabled(disabled) {
            sendButton.disabled = disabled;
            regenerateButton.disabled = disabled;
            messageInput.disabled = disabled;
        }

        // ---------- Modal ----------
        async function openSettings() {
            settingsModal.classList.add('active');
            usernameInput.value = username;
            
            // Hiển thị đang tải
            promptInput.value = 'Đang tải prompt...';
            
            // Gọi API lấy prompt mới nhất
            try {
                const response = await fetch('https://mychatai-backend-er2y.onrender.com/get-prompt');
                if (response.ok) {
                    const data = await response.json();
                    currentPrompt = data.prompt;
                    systemPrompt = currentPrompt;
                    promptInput.value = currentPrompt;
                    localStorage.setItem(PROMPT_KEY, currentPrompt);
                } else {
                    promptInput.value = systemPrompt || 'Lỗi tải prompt';
                }
            } catch (error) {
                console.error('Lỗi khi tải prompt:', error);
                promptInput.value = systemPrompt || 'Không thể tải prompt';
            }
        }

        function closeSettings() {
            settingsModal.classList.remove('active');
        }

        async function saveSettings() {
            const newUsername = usernameInput.value.trim() || 'User';
            saveUsername(newUsername);

            const newPrompt = promptInput.value.trim();
            if (newPrompt && newPrompt !== currentPrompt) {
                await saveSystemPrompt(newPrompt);
            } else {
                closeSettings();
                return;
            }

            closeSettings();
            alert('Đã lưu cài đặt!');
        }

        // ---------- Event Listeners ----------
        function setupEventListeners() {
            sendButton.addEventListener('click', () => {
                const msg = messageInput.value.trim();
                if (msg) {
                    sendMessage(msg);
                    messageInput.value = '';
                    updateCharCount();
                    messageInput.style.height = 'auto';
                }
            });

            regenerateButton.addEventListener('click', regenerateLastResponse);
            themeToggle.addEventListener('click', toggleTheme);
            clearChatBtn.addEventListener('click', clearChat);
            settingsBtn.addEventListener('click', openSettings);

            messageInput.addEventListener('input', updateCharCount);
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendButton.click();
                }
            });

            // Auto resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // Delegate events cho message actions
            messagesContainer.addEventListener('click', (e) => {
                const target = e.target;
                if (target.classList.contains('edit-btn')) {
                    editMessage(target.dataset.id);
                } else if (target.classList.contains('delete-btn')) {
                    if (confirm('Xóa tin nhắn này?')) {
                        deleteMessage(target.dataset.id);
                    }
                }
            });

            // Modal events
            closeSettingsBtn.addEventListener('click', closeSettings);
            saveSettingsBtn.addEventListener('click', saveSettings);

            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) {
                    closeSettings();
                }
            });
        }

        // Khởi chạy
        init();
    </script>
</body>
</html>
